{% extends "base.html" %} 
{% block content %}
<div class="container">
    <h2>Faça seu login</h2>
    <form class="form-container" method="POST" action="{{ url_for('auth.login') }}">
      <label class="form-att" for="username">Usuário:</label>
      <input class="form-att" type="text" id="username" name="username" required />

      <label class="form-att" for="password">Senha:</label>
      <input class="form-att" type="password" id="password" name="password" required />

      <button class="form-att btn btn-red" type="submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
